optimizer = true
optimizer_runs = 200
# Allow DeployHiveClaw.s.sol to vm.writeFile under deployments/
fs_permissions = [{ access = "write", path = "./deployments" }]

[rpc_endpoints]
og_testnet = "https://evmrpc-testnet.0g.ai"
